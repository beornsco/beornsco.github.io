<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2962FF;--orange:#FF6B35;--dark:#23232D;--light:#F7F8FA;--white:#FFFFFF;--gray:#6B7280;--blue-light:#E8EEFF}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--dark);line-height:1.6}
a{color:var(--blue);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:0 24px}
.btn{display:inline-block;background:var(--blue);color:#fff;padding:14px 30px;border-radius:8px;font-size:1rem;font-weight:600;transition:transform .15s,box-shadow .15s;cursor:pointer;border:none;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(41,98,255,.35)}
.btn-outline{display:inline-block;background:transparent;color:var(--blue);padding:10px 22px;border-radius:8px;font-size:.92rem;font-weight:600;border:2px solid var(--blue);transition:background .15s,color .15s}
.btn-outline:hover{background:var(--blue);color:#fff}
.btn-green{background:#16a34a}
.btn-green:hover{box-shadow:0 6px 20px rgba(22,163,74,.35) !important}

nav{background:var(--white);border-bottom:1px solid #E5E7EB;padding:0;position:sticky;top:0;z-index:100}
nav .nav-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .brand{font-weight:700;font-size:1.1rem;color:var(--dark);white-space:nowrap}
nav .nav-links{display:flex;gap:6px;font-size:.88rem}
nav .nav-links a{color:var(--gray);font-weight:500;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap}
nav .nav-links a:hover{color:var(--blue);background:var(--blue-light)}
nav .hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-right:-8px}
nav .hamburger span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0;border-radius:2px;transition:transform .2s,opacity .2s}
@media(max-width:768px){
nav .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--white);flex-direction:column;padding:8px 0;border-bottom:1px solid #E5E7EB;box-shadow:0 8px 24px rgba(0,0,0,.08);gap:0}
nav .nav-links.open{display:flex}
nav .nav-links a{padding:12px 24px;font-size:.95rem;border-radius:0}
nav .nav-links a:hover{background:var(--light)}
nav .hamburger{display:block}
nav .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
nav .hamburger.open span:nth-child(2){opacity:0}
nav .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
}

.hero{padding:80px 0 50px;text-align:center;background:linear-gradient(170deg,var(--blue-light) 0%,var(--white) 100%)}
.hero h1{font-size:clamp(1.8rem,5vw,2.6rem);line-height:1.2;margin-bottom:16px;letter-spacing:-.02em}
.hero p{font-size:1.1rem;color:var(--gray);max-width:620px;margin:0 auto}

section{padding:64px 0}
section.alt{background:var(--light)}
.section-header{text-align:center;margin-bottom:36px}
.section-header h2{font-size:1.55rem;letter-spacing:-.01em;margin-bottom:8px}
.section-header p{color:var(--gray);font-size:1rem;max-width:580px;margin:0 auto}

/* Core SME Toolkit grid */
.core-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
@media(max-width:640px){.core-grid{grid-template-columns:1fr}}

/* Niche packs grid */
.niche-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:860px){.niche-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.niche-grid{grid-template-columns:1fr}}

.card{background:var(--white);border:2px solid #E5E7EB;border-radius:14px;padding:26px 20px;display:flex;flex-direction:column}
.card.featured{border-color:var(--blue);box-shadow:0 8px 30px rgba(41,98,255,.15);position:relative}
.card.featured::before{content:"Best Value";position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:4px 16px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
.card.free-card{border-color:#16a34a;background:linear-gradient(170deg,#f0fdf4 0%,var(--white) 100%)}
.card h3{font-size:1.2rem;margin-bottom:4px;line-height:1.3}
.card .price{font-size:2rem;font-weight:800;color:var(--blue);margin-bottom:2px}
.card .price.free-price{color:#16a34a}
.card .tagline{color:var(--gray);font-size:.9rem;margin-bottom:14px}
.card ul{list-style:none;margin-bottom:20px;flex:1}
.card ul li{padding:4px 0;font-size:.92rem}
.card ul li::before{content:"✓ ";color:var(--blue);font-weight:700}
.card.free-card ul li::before{color:#16a34a}
.card .btn{width:100%;margin-bottom:10px}
.card .learn{text-align:center;font-size:.92rem;font-weight:500;color:var(--blue)}

/* Niche card variant - slightly more compact */
.card.niche{padding:20px 18px}
.card.niche h3{font-size:1.05rem}
.card.niche .price{font-size:1.7rem}
.card.niche ul li{font-size:.88rem}
.card.niche .btn{padding:11px 20px;font-size:.92rem}

.includes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:640px;margin:0 auto}
@media(max-width:560px){.includes-grid{grid-template-columns:1fr}}
.includes-item{display:flex;align-items:flex-start;gap:10px}
.includes-item .icon{font-size:1.3rem;flex-shrink:0}
.includes-item p{font-size:.93rem}
.includes-item strong{display:block;margin-bottom:2px}

footer{padding:36px 0;text-align:center;color:#aaa;font-size:.9rem;background:var(--dark)}
footer a{color:#ccc}

/* Desktop dropdown - hover */
@media(min-width:769px){
  .nav-dropdown { position: relative; display: inline-block; }
  .nav-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; min-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 200; padding: 8px 0; }
  .nav-dropdown:hover .nav-dropdown-content { display: block; }
  .nav-dropdown-content a { display: block; padding: 8px 16px; color: #374151; font-size: .87rem; white-space: nowrap; }
  .nav-dropdown-content a:hover { background: #F3F4F6; color: #2962FF; }
  .nav-dropdown-section { padding: 6px 16px 4px; font-size: .75rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
}

/* Mobile dropdown - click/tap */
@media(max-width:768px){
  .nav-dropdown-content { display: none; background: #f9fafb; padding: 4px 0 4px 16px; }
  .nav-dropdown-content.open { display: block; }
  .nav-dropdown-content a { display: block; padding: 10px 16px; color: #374151; font-size: .9rem; }
  .nav-dropdown-section { padding: 6px 16px 2px; font-size: .72rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 4px 0; }
  .nav-dropdown > a::after { content: " ▾"; font-size: .7rem; }
  .nav-dropdown.open > a::after { content: " ▴"; font-size: .7rem; }
}</style>

<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var links = document.getElementById('nav-links');
  var dropdownTrigger = document.querySelector('.nav-dropdown > a');
  var dropdownContent = document.querySelector('.nav-dropdown-content');
  var dropdown = document.querySelector('.nav-dropdown');

  // Hamburger toggle
  if(btn && links){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      btn.classList.toggle('open');
      links.classList.toggle('open');
    });
  }

  // Mobile: Products dropdown toggle (prevent nav close)
  if(dropdownTrigger && dropdownContent){
    dropdownTrigger.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('open');
        dropdownContent.classList.toggle('open');
      }
    });
  }

  // Close nav when clicking outside
  document.addEventListener('click', function(e){
    if(links && !links.contains(e.target) && btn && !btn.contains(e.target)){
      links.classList.remove('open');
      btn.classList.remove('open');
      if(dropdown) dropdown.classList.remove('open');
      if(dropdownContent) dropdownContent.classList.remove('open');
    }
  });
})();
</script>
</body>
