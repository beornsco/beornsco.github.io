<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Playbook for SMEs. Beorns Co | Beorns Co</title>
<meta name="description" content="12 step-by-step playbooks to automate your business with AI. 170 pages, 50 prompt templates, tool comparison. €39, one-time purchase.">
<meta property="og:title" content="AI Automation Playbook for SMEs. Beorns Co">
<meta property="og:description" content="12 step-by-step automation playbooks for non-technical business owners. 170 pages of practical, hands-on guides.">
<meta property="og:url" content="https://beornsco.github.io/ai-automation-playbook/">
<meta property="og:type" content="product">
<link rel="canonical" href="https://beornsco.github.io/ai-automation-playbook/">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2962FF;--dark:#23232D;--light:#F7F8FA;--white:#FFFFFF;--gray:#6B7280;--blue-light:#E8EEFF;--green:#059669;--orange:#D97706}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--dark);background:var(--white);line-height:1.6}
a{color:var(--blue);text-decoration:none}
.container{max-width:720px;margin:0 auto;padding:0 1.5rem}

/* Nav */

nav .inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}

/* Hero */
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:var(--white);padding:4rem 1.5rem;text-align:center}
.hero h1{font-size:2.4rem;margin-bottom:0.5rem;line-height:1.2}
.hero .subtitle{font-size:1.2rem;opacity:0.9;margin-bottom:1.5rem}
.hero .price{font-size:2rem;font-weight:700;margin-bottom:0.5rem}
.hero .price-note{font-size:0.9rem;opacity:0.7;margin-bottom:1.5rem}
.btn{display:inline-block;background:var(--blue);color:var(--white);padding:14px 36px;border-radius:8px;font-size:1.1rem;font-weight:600;border:none;cursor:pointer;transition:background 0.2s}
.btn:hover{background:#1e50d4}
.trust{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;font-size:0.9rem;opacity:0.85}

/* Stats */
.stats{background:var(--blue-light);padding:2rem 1.5rem;text-align:center}
.stats-grid{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.stat{padding:1rem}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--blue)}
.stat .label{font-size:0.85rem;color:var(--gray)}

/* Sections */
section{padding:3rem 1.5rem}
section h2{font-size:1.8rem;margin-bottom:1rem;text-align:center}
section .lead{text-align:center;color:var(--gray);margin-bottom:2rem;max-width:600px;margin-left:auto;margin-right:auto}

/* Playbooks grid */
.playbooks{max-width:720px;margin:0 auto}
.playbook-group{margin-bottom:2rem}
.playbook-group h3{font-size:1.1rem;color:var(--blue);margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--blue-light)}
.playbook-item{display:flex;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;padding:0.5rem 0}
.playbook-num{background:var(--blue);color:var(--white);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.playbook-info h4{font-size:0.95rem;margin-bottom:0.15rem}
.playbook-info p{font-size:0.85rem;color:var(--gray)}

/* What's inside */
.inside-grid{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.inside-item{background:var(--light);padding:1.25rem;border-radius:8px}
.inside-item h4{font-size:0.95rem;margin-bottom:0.3rem}
.inside-item p{font-size:0.85rem;color:var(--gray)}

/* Who */
.who-list{max-width:600px;margin:0 auto;list-style:none}
.who-list li{padding:0.5rem 0;padding-left:1.5rem;position:relative;font-size:1rem}
.who-list li::before{content:"";position:absolute;left:0;top:0.85rem;width:8px;height:8px;background:var(--green);border-radius:50%}

/* FAQ */
.faq{max-width:600px;margin:0 auto}
.faq-item{border-bottom:1px solid #E5E7EB;padding:1rem 0}
.faq-item h4{font-size:1rem;margin-bottom:0.5rem}
.faq-item p{font-size:0.9rem;color:var(--gray)}

/* CTA */
.cta-section{background:var(--dark);color:var(--white);text-align:center;padding:3rem 1.5rem}
.cta-section h2{color:var(--white);margin-bottom:0.5rem}
.cta-section p{opacity:0.8;margin-bottom:1.5rem}

/* Cross-sell */
.cross-sell{background:var(--blue-light);padding:2rem 1.5rem;text-align:center}
.cross-sell h3{font-size:1.2rem;margin-bottom:0.5rem}
.cross-sell p{color:var(--gray);margin-bottom:1rem;font-size:0.95rem}
.cross-sell-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.cross-sell-link{background:var(--white);padding:1rem 1.5rem;border-radius:8px;border:1px solid #E5E7EB;font-weight:600}

/* Footer */

@media(max-width:600px){
  .hero h1{font-size:1.8rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .inside-grid{grid-template-columns:1fr}
  .trust{flex-direction:column;align-items:center;gap:0.5rem}
}
nav{background:var(--white);border-bottom:1px solid #E5E7EB;padding:0;position:sticky;top:0;z-index:100}
nav .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .brand{font-weight:700;font-size:1.1rem;color:var(--dark);white-space:nowrap}
nav .nav-links{display:flex;gap:6px;font-size:.88rem}
nav .nav-links a{color:var(--gray);font-weight:500;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap}
nav .nav-links a:hover{color:var(--blue);background:var(--blue-light)}
nav .hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-right:-8px}
nav .hamburger span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0;border-radius:2px;transition:transform .2s,opacity .2s}
@media(max-width:768px){
nav .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--white);flex-direction:column;padding:8px 0;border-bottom:1px solid #E5E7EB;box-shadow:0 8px 24px rgba(0,0,0,.08);gap:0}
nav .nav-links.open{display:flex}
nav .nav-links a{padding:12px 24px;font-size:.95rem;border-radius:0}
nav .nav-links a:hover{background:var(--light)}
nav .hamburger{display:block}
nav .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
nav .hamburger.open span:nth-child(2){opacity:0}
nav .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
}
footer{padding:36px 0;text-align:center;color:#aaa;font-size:.9rem;background:var(--dark)}
footer a{color:#ccc}

/* Desktop dropdown - hover */
@media(min-width:769px){
  .nav-dropdown { position: relative; display: inline-block; }
  .nav-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; min-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 200; padding: 8px 0; }
  .nav-dropdown:hover .nav-dropdown-content { display: block; }
  .nav-dropdown-content a { display: block; padding: 8px 16px; color: #374151; font-size: .87rem; white-space: nowrap; }
  .nav-dropdown-content a:hover { background: #F3F4F6; color: #2962FF; }
  .nav-dropdown-section { padding: 6px 16px 4px; font-size: .75rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
}

/* Mobile dropdown - click/tap */
@media(max-width:768px){
  .nav-dropdown-content { display: none; background: #f9fafb; padding: 4px 0 4px 16px; }
  .nav-dropdown-content.open { display: block; }
  .nav-dropdown-content a { display: block; padding: 10px 16px; color: #374151; font-size: .9rem; }
  .nav-dropdown-section { padding: 6px 16px 2px; font-size: .72rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 4px 0; }
  .nav-dropdown > a::after { content: " ▾"; font-size: .7rem; }
  .nav-dropdown.open > a::after { content: " ▴"; font-size: .7rem; }
}</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3S7D3JJ9JS"></script>
<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var links = document.getElementById('nav-links');
  var dropdownTrigger = document.querySelector('.nav-dropdown > a');
  var dropdownContent = document.querySelector('.nav-dropdown-content');
  var dropdown = document.querySelector('.nav-dropdown');

  // Hamburger toggle
  if(btn && links){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      btn.classList.toggle('open');
      links.classList.toggle('open');
    });
  }

  // Mobile: Products dropdown toggle (prevent nav close)
  if(dropdownTrigger && dropdownContent){
    dropdownTrigger.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('open');
        dropdownContent.classList.toggle('open');
      }
    });
  }

  // Close nav when clicking outside
  document.addEventListener('click', function(e){
    if(links && !links.contains(e.target) && btn && !btn.contains(e.target)){
      links.classList.remove('open');
      btn.classList.remove('open');
      if(dropdown) dropdown.classList.remove('open');
      if(dropdownContent) dropdownContent.classList.remove('open');
    }
  });
})();
</script>
</body>
</html>
