<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2962FF;--dark:#23232D;--light:#F7F8FA;--white:#FFFFFF;--gray:#6B7280;--blue-light:#E8EEFF;--green:#16a34a;--green-bg:#dcfce7}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--dark);line-height:1.6}
a{color:var(--blue);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 24px}
.btn{display:inline-block;background:var(--green);color:#fff;padding:16px 36px;border-radius:8px;font-size:1.05rem;font-weight:600;transition:transform .15s,box-shadow .15s;cursor:pointer;border:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(22,163,74,.35)}
.btn-blue{background:var(--blue)}
.btn-blue:hover{box-shadow:0 6px 20px rgba(41,98,255,.35)}

/* Hero */
.hero{padding:80px 0 60px;text-align:center;background:linear-gradient(170deg,var(--blue-light) 0%,var(--white) 100%)}
.hero .badge{display:inline-block;background:var(--green-bg);color:var(--green);padding:6px 16px;border-radius:20px;font-size:.85rem;font-weight:600;margin-bottom:20px}
.hero h1{font-size:clamp(2rem,5vw,2.8rem);line-height:1.2;margin-bottom:16px;letter-spacing:-.02em}
.hero p{font-size:1.15rem;color:var(--gray);max-width:580px;margin:0 auto 28px}
.hero .social-proof{color:var(--gray);font-size:.95rem;margin-top:16px}

/* Signup form */
.signup-box{background:var(--white);border:2px solid #E5E7EB;border-radius:14px;padding:32px 28px;max-width:520px;margin:0 auto;text-align:center}
.signup-box h3{font-size:1.2rem;margin-bottom:16px}
.signup-form{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.signup-form input[type="email"]{flex:1;min-width:220px;padding:14px 18px;border:2px solid #E5E7EB;border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s}
.signup-form input[type="email"]:focus{border-color:var(--blue)}
.signup-note{color:var(--gray);font-size:.85rem;margin-top:10px}
#ml-msg{margin-top:12px;font-weight:600;display:none}

/* Sections */
section{padding:64px 0}
section.alt{background:var(--light)}
h2{font-size:1.6rem;margin-bottom:12px;text-align:center;letter-spacing:-.01em}
.section-subtitle{text-align:center;color:var(--gray);font-size:1.05rem;max-width:600px;margin:0 auto 36px}

/* Benefits */
.benefits{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:36px}
@media(max-width:700px){.benefits{grid-template-columns:1fr}}
.benefit{text-align:center;padding:24px 16px}
.benefit .icon{font-size:2rem;margin-bottom:12px}
.benefit h3{font-size:1.1rem;margin-bottom:8px}
.benefit p{color:var(--gray);font-size:.95rem}

/* Day-by-day */
.days{max-width:640px;margin:0 auto}
.day{display:flex;gap:20px;padding:24px 0;border-bottom:1px solid #E5E7EB}
.day:last-child{border-bottom:none}
.day-num{flex-shrink:0;width:56px;height:56px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem}
.day-content h3{font-size:1.1rem;margin-bottom:4px}
.day-content p{color:var(--gray);font-size:.95rem}

/* FAQ */
.faq{max-width:640px;margin:0 auto}
.faq-item{border-bottom:1px solid #E5E7EB;padding:20px 0}
.faq-item:last-child{border-bottom:none}
.faq-q{font-weight:700;font-size:1.05rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.faq-q::after{content:"+";font-size:1.4rem;color:var(--blue);transition:transform .2s}
.faq-item.open .faq-q::after{transform:rotate(45deg)}
.faq-a{color:var(--gray);font-size:.95rem;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;padding-top:0}
.faq-item.open .faq-a{max-height:200px;padding-top:12px}

/* Products cross-sell */
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:900px){.products{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.products{grid-template-columns:1fr}}
.card{background:var(--white);border:2px solid #E5E7EB;border-radius:14px;padding:28px 22px;display:flex;flex-direction:column;text-align:center}
.card h3{font-size:1.2rem;margin-bottom:4px}
.card .price{font-size:2rem;font-weight:800;color:var(--blue);margin-bottom:2px}
.card .tagline{color:var(--gray);font-size:.9rem;margin-bottom:16px}
.card ul{list-style:none;margin-bottom:20px;flex:1;text-align:left}
.card ul li{padding:4px 0;font-size:.93rem}
.card ul li::before{content:"✓ ";color:var(--blue);font-weight:700}
.card .btn-blue{width:100%;text-align:center;margin-bottom:8px}

/* CTA bottom */
.cta-bottom{text-align:center;max-width:560px;margin:0 auto}

/* Footer */

/* Animations */
@media(prefers-reduced-motion:no-preference){
  .fade-in{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
  .fade-in.visible{opacity:1;transform:none}
}
nav{background:var(--white);border-bottom:1px solid #E5E7EB;padding:0;position:sticky;top:0;z-index:100}
nav .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .brand{font-weight:700;font-size:1.1rem;color:var(--dark);white-space:nowrap}
nav .nav-links{display:flex;gap:6px;font-size:.88rem}
nav .nav-links a{color:var(--gray);font-weight:500;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap}
nav .nav-links a:hover{color:var(--blue);background:var(--blue-light)}
nav .hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-right:-8px}
nav .hamburger span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0;border-radius:2px;transition:transform .2s,opacity .2s}
@media(max-width:768px){
nav .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--white);flex-direction:column;padding:8px 0;border-bottom:1px solid #E5E7EB;box-shadow:0 8px 24px rgba(0,0,0,.08);gap:0}
nav .nav-links.open{display:flex}
nav .nav-links a{padding:12px 24px;font-size:.95rem;border-radius:0}
nav .nav-links a:hover{background:var(--light)}
nav .hamburger{display:block}
nav .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
nav .hamburger.open span:nth-child(2){opacity:0}
nav .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
}
footer{padding:36px 0;text-align:center;color:#aaa;font-size:.9rem;background:var(--dark)}
footer a{color:#ccc}

/* Desktop dropdown - hover */
@media(min-width:769px){
  .nav-dropdown { position: relative; display: inline-block; }
  .nav-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; min-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 200; padding: 8px 0; }
  .nav-dropdown:hover .nav-dropdown-content { display: block; }
  .nav-dropdown-content a { display: block; padding: 8px 16px; color: #374151; font-size: .87rem; white-space: nowrap; }
  .nav-dropdown-content a:hover { background: #F3F4F6; color: #2962FF; }
  .nav-dropdown-section { padding: 6px 16px 4px; font-size: .75rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
}

/* Mobile dropdown - click/tap */
@media(max-width:768px){
  .nav-dropdown-content { display: none; background: #f9fafb; padding: 4px 0 4px 16px; }
  .nav-dropdown-content.open { display: block; }
  .nav-dropdown-content a { display: block; padding: 10px 16px; color: #374151; font-size: .9rem; }
  .nav-dropdown-section { padding: 6px 16px 2px; font-size: .72rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 4px 0; }
  .nav-dropdown > a::after { content: " ▾"; font-size: .7rem; }
  .nav-dropdown.open > a::after { content: " ▴"; font-size: .7rem; }
}</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3S7D3JJ9JS"></script>
<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var links = document.getElementById('nav-links');
  var dropdownTrigger = document.querySelector('.nav-dropdown > a');
  var dropdownContent = document.querySelector('.nav-dropdown-content');
  var dropdown = document.querySelector('.nav-dropdown');

  // Hamburger toggle
  if(btn && links){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      btn.classList.toggle('open');
      links.classList.toggle('open');
    });
  }

  // Mobile: Products dropdown toggle (prevent nav close)
  if(dropdownTrigger && dropdownContent){
    dropdownTrigger.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('open');
        dropdownContent.classList.toggle('open');
      }
    });
  }

  // Close nav when clicking outside
  document.addEventListener('click', function(e){
    if(links && !links.contains(e.target) && btn && !btn.contains(e.target)){
      links.classList.remove('open');
      btn.classList.remove('open');
      if(dropdown) dropdown.classList.remove('open');
      if(dropdownContent) dropdownContent.classList.remove('open');
    }
  });
})();
</script>
</body>
</html>
