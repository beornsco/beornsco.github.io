<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompts for Roofers in the Netherlands (2026 Guide) | Beorns Co</title>
<meta name="description" content="AI prompts for roofers in the Netherlands. Handle storm damage insurance claims, canal house roof constraints, BTW quotes, and professional client communication.">
<link rel="canonical" href="https://beornsco.github.io/ai-prompts-for-roofers-in-netherlands/">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2962FF;--orange:#FF6B35;--dark:#23232D;--light:#F7F8FA;--white:#FFFFFF;--gray:#6B7280;--blue-light:#E8EEFF;--orange-light:#FFF0EA}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--dark);line-height:1.7;font-size:1rem}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:760px;margin:0 auto;padding:0 24px}
.btn{display:inline-block;background:var(--orange);color:#fff;padding:16px 36px;border-radius:8px;font-size:1.05rem;font-weight:700;transition:transform .15s,box-shadow .15s;cursor:pointer;border:none;letter-spacing:.01em}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,.4);text-decoration:none}
.btn-blue{background:var(--blue)}
.btn-blue:hover{box-shadow:0 6px 20px rgba(41,98,255,.35)}
.hero{padding:72px 0 56px;background:linear-gradient(170deg,var(--blue-light) 0%,var(--white) 100%)}
.hero .badge{display:inline-block;background:var(--orange-light);color:var(--orange);font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:20px}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.6rem);line-height:1.18;margin-bottom:18px;letter-spacing:-.02em}
.hero h1 span{color:var(--blue)}
.hero p{font-size:1.1rem;color:var(--gray);max-width:580px;margin:0 0 28px}
section{padding:56px 0}
section.alt{background:var(--light)}
h2{font-size:1.5rem;margin-bottom:10px;letter-spacing:-.01em;line-height:1.25}
h3{font-size:1.1rem;margin:20px 0 6px;color:var(--dark)}
p{margin-bottom:14px;color:#374151}
p:last-child{margin-bottom:0}
.section-label{font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.section-sub{color:var(--gray);font-size:1.02rem;margin-bottom:28px}
.prompt-box{background:var(--white);border:1px solid #E5E7EB;border-left:4px solid var(--blue);border-radius:8px;padding:20px 22px;margin:14px 0;font-size:.95rem}
.prompt-box .prompt-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:8px}
.prompt-box .prompt-text{background:var(--light);border-radius:6px;padding:14px 16px;font-family:ui-monospace,monospace;font-size:.88rem;line-height:1.6;color:#23232D;white-space:pre-wrap;word-break:break-word}
.use-case{background:var(--white);border:1px solid #E5E7EB;border-radius:10px;padding:18px 22px;margin:12px 0}
.use-case .uc-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--orange);margin-bottom:6px}
.faq-item{background:var(--white);border:1px solid #E5E7EB;border-radius:10px;padding:20px 24px;margin:12px 0}
.faq-item strong{display:block;font-size:1rem;margin-bottom:6px;color:var(--dark)}
.faq-item p{color:var(--gray);font-size:.97rem}
.country-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.country-links a{background:var(--white);border:1px solid #E5E7EB;border-radius:20px;padding:7px 16px;font-size:.88rem;color:var(--gray);transition:border-color .15s,color .15s}
.country-links a:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:16px}
.related-card{background:var(--white);border:1px solid #E5E7EB;border-radius:8px;padding:14px 18px;font-size:.93rem}
.related-card a{font-weight:600}
.related-card span{display:block;color:var(--gray);font-size:.85rem;margin-top:2px}
nav{background:var(--white);border-bottom:1px solid #E5E7EB;padding:0;position:sticky;top:0;z-index:100}
nav .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .brand{font-weight:700;font-size:1.1rem;color:var(--dark);white-space:nowrap}
nav .nav-links{display:flex;gap:6px;font-size:.88rem}
nav .nav-links a{color:var(--gray);font-weight:500;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap}
nav .nav-links a:hover{color:var(--blue);background:var(--blue-light)}
nav .hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-right:-8px}
nav .hamburger span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0;border-radius:2px}
@media(max-width:768px){
nav .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--white);flex-direction:column;padding:8px 0;border-bottom:1px solid #E5E7EB;box-shadow:0 8px 24px rgba(0,0,0,.08);gap:0}
nav .nav-links.open{display:flex}
nav .nav-links a{padding:12px 24px;font-size:.95rem;border-radius:0}
nav .hamburger{display:block}
}
footer{padding:36px 0;text-align:center;color:#aaa;font-size:.9rem;background:var(--dark)}
footer a{color:#ccc}
@media(prefers-reduced-motion:no-preference){.fade-in{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}.fade-in.visible{opacity:1;transform:none}}

/* Desktop dropdown - hover */
@media(min-width:769px){
  .nav-dropdown { position: relative; display: inline-block; }
  .nav-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; min-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 200; padding: 8px 0; }
  .nav-dropdown:hover .nav-dropdown-content { display: block; }
  .nav-dropdown-content a { display: block; padding: 8px 16px; color: #374151; font-size: .87rem; white-space: nowrap; }
  .nav-dropdown-content a:hover { background: #F3F4F6; color: #2962FF; }
  .nav-dropdown-section { padding: 6px 16px 4px; font-size: .75rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
}

/* Mobile dropdown - click/tap */
@media(max-width:768px){
  .nav-dropdown-content { display: none; background: #f9fafb; padding: 4px 0 4px 16px; }
  .nav-dropdown-content.open { display: block; }
  .nav-dropdown-content a { display: block; padding: 10px 16px; color: #374151; font-size: .9rem; }
  .nav-dropdown-section { padding: 6px 16px 2px; font-size: .72rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 4px 0; }
  .nav-dropdown > a::after { content: " ▾"; font-size: .7rem; }
  .nav-dropdown.open > a::after { content: " ▴"; font-size: .7rem; }
}</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3S7D3JJ9JS"></script>
<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var links = document.getElementById('nav-links');
  var dropdownTrigger = document.querySelector('.nav-dropdown > a');
  var dropdownContent = document.querySelector('.nav-dropdown-content');
  var dropdown = document.querySelector('.nav-dropdown');

  // Hamburger toggle
  if(btn && links){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      btn.classList.toggle('open');
      links.classList.toggle('open');
    });
  }

  // Mobile: Products dropdown toggle (prevent nav close)
  if(dropdownTrigger && dropdownContent){
    dropdownTrigger.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('open');
        dropdownContent.classList.toggle('open');
      }
    });
  }

  // Close nav when clicking outside
  document.addEventListener('click', function(e){
    if(links && !links.contains(e.target) && btn && !btn.contains(e.target)){
      links.classList.remove('open');
      btn.classList.remove('open');
      if(dropdown) dropdown.classList.remove('open');
      if(dropdownContent) dropdownContent.classList.remove('open');
    }
  });
})();
</script>
</body>
</html>
