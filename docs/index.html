<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Getting Started with AI Business Toolkit | Beorns Co">
<meta property="og:description" content="Choose the right AI toolkit for your business. Guides, prompts, and playbooks from €19.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2962FF;--dark:#23232D;--light:#F7F8FA;--white:#FFFFFF;--gray:#6B7280;--blue-light:#E8EEFF}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--dark);line-height:1.6}
a{color:var(--blue);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 24px}
.btn{display:inline-block;background:var(--blue);color:#fff;padding:16px 36px;border-radius:8px;font-size:1.05rem;font-weight:600;transition:transform .15s,box-shadow .15s;cursor:pointer;border:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(41,98,255,.35)}
.btn-sm{padding:12px 24px;font-size:.95rem}
.btn-green{background:#16a34a}
.btn-green:hover{box-shadow:0 6px 20px rgba(22,163,74,.35)}

nav{background:var(--white);border-bottom:1px solid #E5E7EB;padding:0;position:sticky;top:0;z-index:100}
nav .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .brand{font-weight:700;font-size:1.1rem;color:var(--dark);white-space:nowrap}
nav .nav-links{display:flex;gap:6px;font-size:.88rem}
nav .nav-links a{color:var(--gray);font-weight:500;padding:6px 10px;border-radius:6px;transition:background .15s,color .15s;white-space:nowrap}
nav .nav-links a:hover{color:var(--blue);background:var(--blue-light)}
nav .hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-right:-8px}
nav .hamburger span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0;border-radius:2px;transition:transform .2s,opacity .2s}
@media(max-width:768px){
nav .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--white);flex-direction:column;padding:8px 0;border-bottom:1px solid #E5E7EB;box-shadow:0 8px 24px rgba(0,0,0,.08);gap:0}
nav .nav-links.open{display:flex}
nav .nav-links a{padding:12px 24px;font-size:.95rem;border-radius:0}
nav .nav-links a:hover{background:var(--light)}
nav .hamburger{display:block}
nav .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
nav .hamburger.open span:nth-child(2){opacity:0}
nav .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
}
nav .nav-links a.active{color:var(--blue);font-weight:700}

.hero{padding:80px 0 50px;text-align:center;background:linear-gradient(170deg,var(--blue-light) 0%,var(--white) 100%)}
.hero h1{font-size:clamp(2rem,5vw,2.8rem);line-height:1.2;margin-bottom:16px;letter-spacing:-.02em}
.hero p{font-size:1.1rem;color:var(--gray);max-width:560px;margin:0 auto}

section{padding:64px 0}
section.alt{background:var(--light)}
h2{font-size:1.6rem;margin-bottom:28px;letter-spacing:-.01em}
h3{font-size:1.2rem;margin-bottom:12px}

.doc-content{max-width:720px;margin:0 auto}
.doc-content p{margin-bottom:16px;color:var(--gray);font-size:1.02rem}
.doc-content h2{text-align:left;margin-top:48px;margin-bottom:16px;padding-top:24px;border-top:1px solid #E5E7EB}
.doc-content h2:first-of-type{margin-top:0;border-top:none;padding-top:0}

.decision-tree{list-style:none;padding:0}
.decision-tree li{background:var(--white);border:2px solid #E5E7EB;border-radius:12px;padding:20px 24px;margin-bottom:16px;transition:border-color .2s}
.decision-tree li:hover{border-color:var(--blue)}
.decision-tree li .scenario{font-weight:700;font-size:1.05rem;color:var(--dark);display:block;margin-bottom:6px}
.decision-tree li .recommendation{color:var(--gray);font-size:.95rem}
.decision-tree li .recommendation a{font-weight:600}

.steps{list-style:none;padding:0;counter-reset:step}
.steps li{position:relative;padding:16px 0 16px 56px;border-left:2px solid #E5E7EB;margin-left:20px}
.steps li:last-child{border-left:2px solid transparent}
.steps li::before{counter-increment:step;content:counter(step);position:absolute;left:-16px;top:14px;width:32px;height:32px;background:var(--blue);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem}
.steps li strong{display:block;color:var(--dark);margin-bottom:4px}
.steps li span{color:var(--gray);font-size:.95rem}

.product-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin:24px 0}
@media(max-width:600px){.product-summary{grid-template-columns:1fr}}
.product-card{background:var(--white);border:2px solid #E5E7EB;border-radius:12px;padding:24px 20px;text-align:center}
.product-card h3{font-size:1.1rem;margin-bottom:4px}
.product-card .price{font-size:1.8rem;font-weight:800;color:var(--blue);margin-bottom:2px}
.product-card .pages{color:var(--gray);font-size:.85rem;margin-bottom:12px}
.product-card ul{list-style:none;text-align:left;margin-bottom:16px;font-size:.9rem}
.product-card ul li{padding:3px 0}
.product-card ul li::before{content:"✓ ";color:var(--blue);font-weight:700}

.free-list{list-style:none;padding:0}
.free-list li{padding:10px 0;font-size:1rem;border-bottom:1px solid #E5E7EB}
.free-list li:last-child{border-bottom:none}
.free-list li::before{content:"🎁 ";margin-right:4px}

.compat-grid{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0}
.compat-tag{background:var(--blue-light);color:var(--blue);padding:8px 16px;border-radius:20px;font-size:.9rem;font-weight:600}

.faq-item{margin-bottom:24px}
.faq-item summary{font-weight:700;font-size:1.05rem;cursor:pointer;padding:12px 0;list-style:none;display:flex;align-items:center;gap:8px}
.faq-item summary::before{content:"+";display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:1rem;flex-shrink:0}
.faq-item[open] summary::before{content:"-"}
.faq-item p{color:var(--gray);padding:0 0 8px 32px;font-size:.95rem}

footer{padding:36px 0;text-align:center;color:#aaa;font-size:.9rem;background:var(--dark)}
footer a{color:#ccc}

@media(prefers-reduced-motion:no-preference){
  .fade-in{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
  .fade-in.visible{opacity:1;transform:none}
}

/* Desktop dropdown - hover */
@media(min-width:769px){
  .nav-dropdown { position: relative; display: inline-block; }
  .nav-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; min-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 200; padding: 8px 0; }
  .nav-dropdown:hover .nav-dropdown-content { display: block; }
  .nav-dropdown-content a { display: block; padding: 8px 16px; color: #374151; font-size: .87rem; white-space: nowrap; }
  .nav-dropdown-content a:hover { background: #F3F4F6; color: #2962FF; }
  .nav-dropdown-section { padding: 6px 16px 4px; font-size: .75rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
}

/* Mobile dropdown - click/tap */
@media(max-width:768px){
  .nav-dropdown-content { display: none; background: #f9fafb; padding: 4px 0 4px 16px; }
  .nav-dropdown-content.open { display: block; }
  .nav-dropdown-content a { display: block; padding: 10px 16px; color: #374151; font-size: .9rem; }
  .nav-dropdown-section { padding: 6px 16px 2px; font-size: .72rem; font-weight: 700; color: #9CA3AF; text-transform: uppercase; }
  .nav-dropdown-divider { border: none; border-top: 1px solid #E5E7EB; margin: 4px 0; }
  .nav-dropdown > a::after { content: " ▾"; font-size: .7rem; }
  .nav-dropdown.open > a::after { content: " ▴"; font-size: .7rem; }
}</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3S7D3JJ9JS"></script>
<script>
(function(){
  var btn = document.getElementById('nav-hamburger');
  var links = document.getElementById('nav-links');
  var dropdownTrigger = document.querySelector('.nav-dropdown > a');
  var dropdownContent = document.querySelector('.nav-dropdown-content');
  var dropdown = document.querySelector('.nav-dropdown');

  // Hamburger toggle
  if(btn && links){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      btn.classList.toggle('open');
      links.classList.toggle('open');
    });
  }

  // Mobile: Products dropdown toggle (prevent nav close)
  if(dropdownTrigger && dropdownContent){
    dropdownTrigger.addEventListener('click', function(e){
      if(window.innerWidth <= 768){
        e.preventDefault();
        e.stopPropagation();
        dropdown.classList.toggle('open');
        dropdownContent.classList.toggle('open');
      }
    });
  }

  // Close nav when clicking outside
  document.addEventListener('click', function(e){
    if(links && !links.contains(e.target) && btn && !btn.contains(e.target)){
      links.classList.remove('open');
      btn.classList.remove('open');
      if(dropdown) dropdown.classList.remove('open');
      if(dropdownContent) dropdownContent.classList.remove('open');
    }
  });
})();
</script>
</body>
</html>
